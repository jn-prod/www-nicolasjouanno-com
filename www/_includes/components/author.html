<img class="c-post-card__avatar" src="/images/icons/avatar.svg" alt="Avatar de {{ author.name }}" />
<div itemprop="publisher" itemscope itemtype="http://schema.org/Organization">
  <a href="{{ site.url }}" class="c-post-card__author-name">
    <span itemprop="name">{{ author.name }}</span>
  </a>
  <span itemprop="logo" itemscope itemtype="https://schema.org/ImageObject">
    <meta itemprop="url" content="{{ site.logo | absolute_url }}" />
    <meta itemprop="width" content="60" />
    <meta itemprop="height" content="60" />
  </span>
  <meta itemprop="url" content="{{ site.url }}" />
  {% if author.linkedin %}<link itemprop="sameAs" href="{{ author.linkedin }}" />{% endif %}
  {% if author.github %}<link itemprop="sameAs" href="{{ author.github }}" />{% endif %}
  {% if author.twitter %}<link itemprop="sameAs" href="{{ author.twitter }}" />{% endif %}
  {% if author.mediumcom %}<link itemprop="sameAs" href="{{ author.mediumcom }}" />{% endif %}
  {% if author.substack %}<link itemprop="sameAs" href="{{ author.substack }}" />{% endif %}
  <div class="c-post-card__meta">
    <span>{{ author.handle }}</span>
    ·
    <time
      itemprop="dateCreated datePublished dateModified"
      datetime="{{ include.post.date | date_to_xmlschema }}"
    >
      {{ include.post.date | date: "%d %B %Y" }}
    </time>
  </div>
</div>

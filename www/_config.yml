# Site Settings
title: "Nicolas Jouanno"
description: "Site personnel de Nicolas Jouanno — Lead développeur frontend (design system, Web Components, accessibilité RGAA), orateur Paris-Web 2025. Veille sur les systèmes agentiques. Sport, code et aventure."
url: "https://www.nicolasjouanno.com"
lang: "fr"
logo: "/images/icons/avatar.svg"
og_image: "/og/og-default.png" # carte sociale raster 1200x630 (hors pipeline images → survit au build ; SVG/WebP non rendus par les réseaux sociaux)

# Waiting list — test de demande (asset freemium). Form kit.com dédié : _includes/plugins/waitlist.html.
# Un post l'active avec `waitlist: true` (copie ci-dessous) ; override possible via `waitlist: {title, text}`.
waitlist:
  title: "Un plan d'entraînement VTT à télécharger, ça t'intéresse ?"
  text: "J'envisage d'en faire une version clé en main — prête à imprimer et à suivre, séance par séance. Laisse-moi ton email si tu la veux : ça m'aidera à décider de la créer, et tu l'auras en avant-première. Juste pour ça, sans spam."


# collections
collections:
  events:
    output: true
    permalink: /events/:slug.html
    sort_by: start

defaults:
  - scope:
      path: "_events"
      type: "events"
    values:
      layout: "event"

# Outputting
lsi: false
safe: true
permalink: /:title:output_ext

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  # - jekyll-archives
  # - jekyll-minifier

